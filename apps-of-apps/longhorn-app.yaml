apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.11.1
    helm:
      values: |
        # Chart explicitly recommends disabling this when installing via ArgoCD
        # — the pre-upgrade Job fires as a PreSync hook before the chart's own
        # ServiceAccount exists, so the Job is unschedulable.
        # https://github.com/longhorn/charts (values.yaml, preUpgradeChecker)
        preUpgradeChecker:
          jobEnabled: false
          upgradeVersionCheck: true
        defaultSettings:
          # single-node lab: one replica is enough and avoids unschedulable PVCs
          defaultReplicaCount: 1
        persistence:
          defaultClass: true
          defaultClassReplicaCount: 1
        longhornUI:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
