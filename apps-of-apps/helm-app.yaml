apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mkalybek/devops2-lab10.git
    targetRevision: HEAD
    path: helm-charts/my-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy: {}
