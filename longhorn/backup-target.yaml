# Tells Longhorn to ship backups to our in-cluster MinIO bucket.
#
# The referenced secret (`minio-backup-secret`) is created by
# bootstrap/03-create-secrets.sh — it is NOT in git.
apiVersion: longhorn.io/v1beta2
kind: Setting
metadata:
  name: backup-target
  namespace: longhorn-system
value: "s3://longhorn-backups@us-east-1/"
---
apiVersion: longhorn.io/v1beta2
kind: Setting
metadata:
  name: backup-target-credential-secret
  namespace: longhorn-system
value: minio-backup-secret
